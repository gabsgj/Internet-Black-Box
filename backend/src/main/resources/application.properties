# Server Port Configuration
server.port=8080

# Spring Data Neo4j Configuration
spring.neo4j.uri=${SPRING_NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${SPRING_NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${SPRING_NEO4J_PASSWORD:password}

# Spring Data Neo4j Mapping & Entity configurations
spring.data.neo4j.database=neo4j

# Integrations Configuration (Loaded from environment variables)
nvidia.api.key=${NVIDIA_API_KEY:}
nvidia.model=${NVIDIA_MODEL:meta/llama-3.1-70b-instruct}
sarvam.api.key=${SARVAM_API_KEY:}
github.personal-access-token=${GITHUB_PERSONAL_ACCESS_TOKEN:}
slack.bot-token=${SLACK_BOT_TOKEN:}
slack.signing-secret=${SLACK_SIGNING_SECRET:}
sentry.dsn=${SENTRY_DSN:}

# Logging configuration
logging.level.org.springframework.data.neo4j=INFO
logging.level.web=DEBUG

# Mock configuration
use.mock.data=${USE_MOCK_DATA:false}
