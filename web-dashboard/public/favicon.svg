<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="16,4 28,10 16,16 4,10" fill="#0f172a" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="4,10 16,16 16,28 4,22" fill="#0d1424" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="28,10 16,16 16,28 28,22" fill="#080e1a" stroke="#10b981" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Key circuit nodes -->
  <circle cx="16" cy="9" r="1.5" fill="#10b981" opacity="0.9"/>
  <circle cx="21" cy="12" r="1.2" fill="#10b981" opacity="0.7"/>
  <circle cx="11" cy="12" r="1.2" fill="#10b981" opacity="0.7"/>

  <!-- Center glow -->
  <circle cx="16" cy="16" r="2" fill="#10b981" opacity="0.4"/>
  <circle cx="16" cy="16" r="1" fill="#10b981" opacity="0.9"/>
</svg>