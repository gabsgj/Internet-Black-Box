<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle (subtle) -->
  <circle cx="256" cy="256" r="240" fill="#0a0f1a" opacity="0.6"/>

  <!-- Isometric cube - three visible faces -->
  <!-- Top face -->
  <polygon points="256,100 400,180 256,260 112,180" fill="#0f172a" stroke="#10b981" stroke-width="3" stroke-linejoin="round"/>
  <!-- Left face -->
  <polygon points="112,180 256,260 256,400 112,320" fill="#0d1424" stroke="#10b981" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right face -->
  <polygon points="400,180 256,260 256,400 400,320" fill="#080e1a" stroke="#10b981" stroke-width="3" stroke-linejoin="round"/>

  <!-- Circuit traces on top face -->
  <line x1="256" y1="155" x2="320" y2="195" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <line x1="320" y1="195" x2="280" y2="215" stroke="#10b981" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="190" x2="256" y2="220" stroke="#10b981" stroke-width="2" opacity="0.5"/>

  <!-- Circuit nodes on top face -->
  <circle cx="256" cy="155" r="5" fill="#10b981" opacity="0.9"/>
  <circle cx="320" cy="195" r="4" fill="#10b981" opacity="0.7"/>
  <circle cx="280" cy="215" r="5" fill="#10b981" opacity="0.9"/>
  <circle cx="200" cy="190" r="4" fill="#10b981" opacity="0.7"/>
  <circle cx="256" cy="220" r="3.5" fill="#10b981" opacity="0.6"/>

  <!-- Circuit traces on left face -->
  <line x1="170" y1="240" x2="200" y2="290" stroke="#10b981" stroke-width="2" opacity="0.35"/>
  <line x1="200" y1="290" x2="220" y2="330" stroke="#10b981" stroke-width="2" opacity="0.35"/>

  <!-- Circuit nodes on left face -->
  <circle cx="170" cy="240" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="200" cy="290" r="3.5" fill="#10b981" opacity="0.45"/>
  <circle cx="220" cy="330" r="3" fill="#10b981" opacity="0.4"/>

  <!-- Circuit traces on right face -->
  <line x1="340" y1="240" x2="310" y2="290" stroke="#10b981" stroke-width="2" opacity="0.35"/>
  <line x1="310" y1="290" x2="330" y2="340" stroke="#10b981" stroke-width="2" opacity="0.35"/>

  <!-- Circuit nodes on right face -->
  <circle cx="340" cy="240" r="4" fill="#10b981" opacity="0.5"/>
  <circle cx="310" cy="290" r="3.5" fill="#10b981" opacity="0.45"/>
  <circle cx="330" cy="340" r="3" fill="#10b981" opacity="0.4"/>

  <!-- Central glow node at cube center -->
  <circle cx="256" cy="260" r="8" fill="#10b981" opacity="0.3"/>
  <circle cx="256" cy="260" r="4" fill="#10b981" opacity="0.8"/>
</svg>
