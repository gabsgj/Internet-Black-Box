services:
  # 1. Spring Boot API Gateway (Web Service)
  - type: web
    name: api-server
    env: docker
    region: oregon
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USERNAME
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: USE_MOCK_DATA
        value: "true"

  # 2. React Web Dashboard (Static Site)
  - type: web
    name: web-dashboard
    env: static
    buildCommand: cd web-dashboard && npm install && npm run build
    staticPublishPath: web-dashboard/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: api-server
          property: host

  # 3. GitHub Ingestion Workflow (Cron Job)
  - type: cron
    name: ingest-github
    env: docker
    schedule: "*/5 * * * *"
    command: "./scripts/ingest-github.sh"
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: NEO4J_URI
        sync: false

  # 4. Incident Reconstruction Workflow (Background Worker)
  - type: worker
    name: reconstruct-incident
    env: docker
    buildCommand: "mvn clean install -DskipTests"
    startCommand: "java -jar target/worker.jar"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
