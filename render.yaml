# ─────────────────────────────────────────────────────────────────────────────
# Internet Black Box — Render Blueprint (render.yaml)
# https://render.com/docs/blueprint-spec
#
# FREE TIER SETUP
#   - api-server    → Web Service, native Java runtime (free, sleeps after 15 min)
#   - web-dashboard → Static Site (always free, never sleeps)
#
# Webhook ingestion (GitHub / Slack / Sentry) is handled directly by the API
# server. Configure these URLs in each platform after first deploy:
#
#   GitHub  → https://<api-server>.onrender.com/api/webhooks/github
#   Slack   → https://<api-server>.onrender.com/api/webhooks/slack
#   Sentry  → https://<api-server>.onrender.com/api/webhooks/sentry
#
# NOTE: Free web services sleep after 15 min of inactivity.
#       First request after sleep takes ~30 sec to wake up.
#       Upgrade to Starter ($7/mo) for always-on behavior.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Spring Boot API (Web Service — Free Tier) ───────────────────────────
  - type: web
    name: api-server
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: free

    # Auto-deploy on every push to main
    autoDeploy: true
    branch: main

    healthCheckPath: /actuator/health

    envVars:
      # Neo4j AuraDB connection
      - key: SPRING_NEO4J_URI
        sync: false          # set manually in Render dashboard

      - key: SPRING_NEO4J_USERNAME
        sync: false

      - key: SPRING_NEO4J_PASSWORD
        sync: false

      # NVIDIA NIM (LLaMA 3.1 70B)
      - key: NVIDIA_API_KEY
        sync: false

      - key: NVIDIA_MODEL
        value: meta/llama-3.1-70b-instruct

      # Sarvam AI (STT + TTS)
      - key: SARVAM_API_KEY
        sync: false

      # GitHub webhook integration
      - key: GITHUB_PERSONAL_ACCESS_TOKEN
        sync: false

      # Slack integration
      - key: SLACK_BOT_TOKEN
        sync: false

      - key: SLACK_SIGNING_SECRET
        sync: false

      # Sentry integration (optional)
      - key: SENTRY_DSN
        sync: false

      # Feature flags
      - key: USE_MOCK_DATA
        value: "false"

  # ── 2. React Web Dashboard (Static Site — Always Free) ─────────────────────
  - type: web
    name: web-dashboard
    runtime: static
    buildCommand: cd web-dashboard && npm ci && npm run build
    staticPublishPath: ./web-dashboard/dist

    autoDeploy: true
    branch: main

    # SPA routing — serve index.html for all unknown paths (React Router)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Cache hashed assets forever, never cache index.html
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

    envVars:
      # Points the frontend at the deployed API server
      - key: VITE_API_URL
        fromService:
          type: web
          name: api-server
          property: host
