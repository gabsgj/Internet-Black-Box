# ─────────────────────────────────────────────────────────────────────────────
# Internet Black Box — Render Blueprint (render.yaml)
# https://render.com/docs/blueprint-spec
#
# Services deployed:
#   1. api-server       → Spring Boot 3 REST API  (Web Service, Docker)
#   2. web-dashboard    → React + Vite SPA         (Static Site)
#
# Webhook ingestion (GitHub / Slack / Sentry) is handled directly by the API
# server at the routes below — configure these URLs in each platform's
# webhook settings after first deploy:
#
#   GitHub   → https://<api-server>/api/webhooks/github
#   Slack    → https://<api-server>/api/webhooks/slack
#   Sentry   → https://<api-server>/api/webhooks/sentry
#
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── 1. Spring Boot API (Web Service) ───────────────────────────────────────
  - type: web
    name: api-server
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    plan: starter

    # Auto-deploy on every push to main
    autoDeploy: true
    branch: main

    healthCheckPath: /actuator/health

    envVars:
      # Neo4j AuraDB connection
      - key: SPRING_NEO4J_URI
        sync: false                  # set manually in Render dashboard

      - key: SPRING_NEO4J_USERNAME
        sync: false

      - key: SPRING_NEO4J_PASSWORD
        sync: false

      # NVIDIA NIM (LLaMA 3.1 70B)
      - key: NVIDIA_API_KEY
        sync: false

      - key: NVIDIA_MODEL
        value: meta/llama-3.1-70b-instruct

      # Sarvam AI (STT + TTS)
      - key: SARVAM_API_KEY
        sync: false

      # GitHub webhook integration
      - key: GITHUB_PERSONAL_ACCESS_TOKEN
        sync: false

      # Slack integration
      - key: SLACK_BOT_TOKEN
        sync: false

      - key: SLACK_SIGNING_SECRET
        sync: false

      # Sentry integration
      - key: SENTRY_DSN
        sync: false

      # Feature flags
      - key: USE_MOCK_DATA
        value: "false"

      # Spring port (Render injects PORT; kept explicit for clarity)
      - key: SERVER_PORT
        value: "8080"

  # ── 2. React Web Dashboard (Static Site) ───────────────────────────────────
  - type: web
    name: web-dashboard
    runtime: static
    buildCommand: cd web-dashboard && npm ci && npm run build
    staticPublishPath: ./web-dashboard/dist

    # Auto-deploy on every push to main
    autoDeploy: true
    branch: main

    # SPA routing: serve index.html for all unknown paths
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      # Cache aggressively for hashed assets, never for index.html
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate

    envVars:
      # Points the frontend at the deployed API server
      - key: VITE_API_URL
        fromService:
          type: web
          name: api-server
          property: host
