services:
  # Backend Ingest & AI API (Spring Boot)
  - type: web
    name: internet-black-box-backend
    env: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/internet-black-box-0.0.1-SNAPSHOT.jar
    envVars:
      - key: PORT
        value: 8080
      - key: SPRING_NEO4J_URI
        sync: false
      - key: SPRING_NEO4J_USERNAME
        sync: false
      - key: SPRING_NEO4J_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: GITHUB_PERSONAL_ACCESS_TOKEN
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false

  # Frontend Web Dashboard (React + Vite static deployment)
  - type: web
    name: internet-black-box-frontend
    env: static
    rootDir: web-dashboard
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
